Title: "PowayServe Community Hub"
Description: "A Poway-wide volunteer + donation landing page powered by local partners (ex: Kiwanis Club of Poway) that helps residents find opportunities, sign up fast, and track community impact."
Topics:
  - title: "PowayServe"
    subtitle: "One page for volunteering, events, and giving."
