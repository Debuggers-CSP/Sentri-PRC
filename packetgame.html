<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packet Forge | System Architect Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; overflow-x: hidden; }
        .mono { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 1.5rem; }
        .neon-glow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.2); border: 1px solid rgba(34, 211, 238, 0.5); }
        @keyframes slide-in { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide { animation: slide-in 0.4s ease-out forwards; }
        .step-indicator { background: linear-gradient(90deg, #22d3ee, #818cf8); }
        .info-panel { border-left: 4px solid #38bdf8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const OSI_DATA = [
            { step: 1, name: "Application", tech: "HTTP/Fetch", desc: "Interfaces with software to initiate network requests. This is where your JavaScript fetch() starts." },
            { step: 2, name: "Presentation", tech: "SSL/TLS", desc: "Translates and encrypts data. It ensures that the information is in a format the receiver can read." },
            { step: 3, name: "Session", tech: "Websockets", desc: "Manages the 'dialogue' between two systems. It opens, maintains, and closes connections." },
            { step: 4, name: "Transport", tech: "TCP Header", desc: "Handles end-to-end communication and error checking. It splits data into segments." },
            { step: 5, name: "Network", tech: "IP Header", desc: "Determines the best physical path for the data using IP addresses (Routing)." },
            { step: 6, name: "Data Link", tech: "Ethernet Frame", desc: "Defines the protocol for hardware-to-hardware data transfer on the same local network (MAC Addresses)." },
            { step: 7, name: "Physical", tech: "Bitstream", desc: "The actual transmission of raw 0s and 1s over hardware like fiber optics, copper wire, or radio waves." }
        ];

        const TCP_DATA = [
            { step: 1, name: "Application", tech: "HTTP/SSL/Session", payload: ["HTTP", "SSL", "Session"], desc: "Combines OSI Layers 5-7. Handles all high-level protocols and data formatting for the web." },
            { step: 2, name: "Transport", tech: "TCP Header", payload: ["TCP"], desc: "Ensures reliable delivery through ports (like 80 or 443) and error sequence checking." },
            { step: 3, name: "Internet", tech: "IP Header", payload: ["IP"], desc: "The 'Routing' layer. Packages data into IP packets to move them across network boundaries." },
            { step: 4, name: "Data Link", tech: "Ethernet Frame", payload: ["Ethernet"], desc: "Creates 'Frames' that hardware can understand to move data between local network nodes." },
            { step: 5, name: "Physical", tech: "Bitstream", payload: ["Bits"], desc: "Converts frames into electrical or optical signals to traverse the physical medium." }
        ];

        function App() {
            const [model, setModel] = useState('OSI');
            const [packet, setPacket] = useState([]);
            const [missionStage, setMissionStage] = useState(1); 
            const [logs, setLogs] = useState(["[SYSTEM]: Architecture Forge Online."]);
            const [nginx, setNginx] = useState({ port: '', origin: '' });

            const log = (msg) => setLogs(prev => [`> ${msg}`, ...prev.slice(0, 3)]);

            const getRequiredStep = () => {
                if (model === 'OSI') return packet.length + 1;
                if (packet.length === 0) return 1;
                if (packet.length === 3) return 2;
                if (packet.length === 4) return 3;
                if (packet.length === 5) return 4;
                if (packet.length === 6) return 5;
                return 6; 
            };

            const currentStep = getRequiredStep();
            const activeInfo = (model === 'OSI' ? OSI_DATA : TCP_DATA).find(l => l.step === currentStep);

            const resetGame = (newModel) => {
                setModel(newModel);
                setPacket([]);
                setMissionStage(1);
                log(`Switched to ${newModel} Mode. Mission Reset.`);
            };

            const addLayer = (layer) => {
                if (missionStage !== 1) return;
                if (layer.step !== currentStep) {
                    return log(`❌ ERROR: Step out of sequence. Follow the Encapsulation order.`);
                }
                if (model === 'TCP') {
                    setPacket([...packet, ...layer.payload]);
                } else {
                    setPacket([...packet, layer.tech]);
                }
                log(`✓ Step ${layer.step} Linked: ${layer.name} headers integrated.`);
            };

            useEffect(() => {
                if (packet.length >= 7 && missionStage === 1) {
                    setMissionStage(2);
                    log("🏆 ENCAPSULATION COMPLETE. Transitioning to Transport Handshake.");
                }
            }, [packet]);

            const runHandshake = () => {
                log("📡 Initiating TCP 3-Way Handshake...");
                setTimeout(() => {
                    log("✓ SYN-ACK Received. Link Stable.");
                    setMissionStage(3);
                }, 1500);
            };

            const deploy = () => {
                const cleanPort = nginx.port.trim();
                const cleanOrigin = nginx.origin.toLowerCase().trim();
                if (cleanPort !== '80' && cleanPort !== '443') return log("❌ SECURITY ALERT: AWS Security Groups only permit 80/443.");
                if (!cleanOrigin.includes("github.io")) return log("❌ GATEWAY REJECTED: Backend only trusts validated GitHub origins.");
                setMissionStage(4);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto flex flex-col gap-6">
                    
                    {/* MISSION DIRECTIVE & TOGGLE */}
                    <div className="glass p-6 border-cyan-500/50 bg-cyan-950/20 flex flex-col md:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-4">
                            <div className="step-indicator text-slate-950 px-3 py-1 rounded font-black text-xs uppercase tracking-tighter">Mission Phase {missionStage}</div>
                            <h2 className="text-cyan-400 font-bold text-sm italic">
                                {missionStage === 1 && `DIRECTIVE: Perform Encapsulation on Layer ${currentStep}.`}
                                {missionStage === 2 && "DIRECTIVE: Establish a reliable TCP connection."}
                                {missionStage === 3 && "DIRECTIVE: Configure the Nginx Reverse Proxy."}
                                {missionStage === 4 && "DIRECTIVE: Node Synchronized. Data Flowing."}
                            </h2>
                        </div>
                        <div className="flex bg-slate-950 p-1 rounded-xl border border-slate-800">
                            <button onClick={() => resetGame('OSI')} className={`px-4 py-1 rounded-lg text-[10px] font-black transition-all ${model === 'OSI' ? 'bg-cyan-500 text-black shadow-[0_0_10px_#22d3ee]' : 'text-slate-500'}`}>OSI (7 STEPS)</button>
                            <button onClick={() => resetGame('TCP')} className={`px-4 py-1 rounded-lg text-[10px] font-black transition-all ${model === 'TCP' ? 'bg-indigo-500 text-black shadow-[0_0_10px_#818cf8]' : 'text-slate-500'}`}>TCP/IP (5 STEPS)</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* THE ARCHITECTURE PALETTE (Left) */}
                        <div className="lg:col-span-4 glass p-6 flex flex-col gap-4">
                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2">Architecture Palette</h3>
                            <div className="space-y-3">
                                {(model === 'OSI' ? OSI_DATA : TCP_DATA).map((l) => {
                                    const isDone = model === 'OSI' ? packet.includes(l.tech) : (l.step === 1 ? packet.includes("HTTP") : l.step === 2 ? packet.includes("TCP") : l.step === 3 ? packet.includes("IP") : l.step === 4 ? packet.includes("Ethernet") : packet.includes("Bits"));
                                    const isNext = !isDone && missionStage === 1 && l.step === currentStep;
                                    return (
                                        <div 
                                            key={l.step} 
                                            onClick={() => addLayer(l)}
                                            className={`p-4 rounded-2xl border-2 transition-all cursor-pointer relative ${isDone ? 'bg-cyan-600 border-white/40' : isNext ? 'border-cyan-400 bg-cyan-400/10 animate-pulse' : 'bg-slate-900 border-slate-800 opacity-20'}`}
                                        >
                                            <div className="flex justify-between items-center mb-1">
                                                <span className={`text-[10px] font-black uppercase ${isDone ? 'text-white' : 'text-cyan-500'}`}>STEP {l.step}</span>
                                                <span className="text-xs font-black text-white">{l.name}</span>
                                            </div>
                                            <p className="text-[9px] mono opacity-60 leading-tight">{l.desc}</p>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>

                        {/* WORKSPACE & INFORMATION PANEL (Right) */}
                        <div className="lg:col-span-8 space-y-6">
                            
                            {/* ARCHITECT'S MANUAL (Lillian's Informative Feedback Panel) */}
                            <div className="glass p-6 info-panel bg-sky-950/10">
                                <h4 className="text-[10px] font-black text-sky-400 uppercase mb-2 tracking-widest">Architect's Manual</h4>
                                <div className="text-sm text-slate-300 leading-relaxed italic">
                                    {missionStage === 1 && (activeInfo ? (
                                        <span><strong>Knowledge Point:</strong> {activeInfo.desc} <br/><span className="text-xs text-slate-500 mt-2 block">Concept: Encapsulation wraps data in headers to prepare it for travel.</span></span>
                                    ) : "Packet Forge Complete. Ready for transport.") }
                                    {missionStage === 2 && "Knowledge Point: The 3-Way Handshake (SYN, SYN-ACK, ACK) establishes a reliable connection so data is delivered in the correct order without loss."}
                                    {missionStage === 3 && "Knowledge Point: Nginx acts as an 'Orchestrator' or Reverse Proxy. It listens on public ports (80/443) and forwards traffic to your internal server (localhost:8587)."}
                                    {missionStage === 4 && "System Active. Data is flowing from GitHub Pages to AWS EC2 across all layers of the stack."}
                                </div>
                            </div>

                            <div className="glass p-8 flex flex-col items-center justify-center relative overflow-hidden min-h-[180px]">
                                <div className="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-cyan-400 to-transparent"></div>
                                <h4 className="text-[10px] text-slate-600 font-black uppercase mb-8 tracking-[0.4em]">Packet Stream</h4>
                                <div className="flex flex-row-reverse items-center gap-2 overflow-x-auto w-full justify-center">
                                    <div className="bg-white text-black px-6 py-4 font-black rounded-sm shadow-[0_0_40px_rgba(255,255,255,0.2)] text-xs shrink-0">DATA</div>
                                    {packet.map((p, i) => (
                                        <div key={i} className="animate-slide bg-cyan-500 text-slate-950 px-3 py-2 text-[10px] font-black rounded italic whitespace-nowrap shrink-0">[{p}]</div>
                                    ))}
                                    {packet.length === 0 && <p className="text-slate-800 italic text-sm text-center">Awaiting Byte-Stream Initialization...</p>}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className={`glass p-6 border-l-4 border-emerald-500 transition-all ${missionStage !== 2 ? 'opacity-20 grayscale pointer-events-none' : 'neon-glow'}`}>
                                    <h5 className="text-[10px] font-black text-emerald-400 uppercase mb-4">Transport Reliability</h5>
                                    <button onClick={runHandshake} className="w-full py-4 bg-emerald-500 text-black rounded-xl text-[10px] font-black hover:scale-105 transition-all">EXECUTE 3-WAY HANDSHAKE</button>
                                </div>

                                <div className={`glass p-6 border-l-4 border-yellow-500 transition-all ${missionStage !== 3 ? 'opacity-20 grayscale pointer-events-none' : 'neon-glow'}`}>
                                    <h5 className="text-[10px] font-black text-yellow-500 uppercase mb-4">Network Orchestration</h5>
                                    <div className="space-y-3">
                                        <input type="text" placeholder="Access Port (80)" className="w-full bg-black/50 border border-slate-800 p-2 rounded text-[10px] text-yellow-500 outline-none focus:border-yellow-500" onChange={e => setNginx({...nginx, port: e.target.value})} />
                                        <input type="text" placeholder="Origin (github.io)" className="w-full bg-black/50 border border-slate-800 p-2 rounded text-[10px] text-yellow-500 outline-none focus:border-yellow-500" onChange={e => setNginx({...nginx, origin: e.target.value})} />
                                        <button onClick={deploy} className="w-full py-2 bg-yellow-500 text-black rounded-lg font-black text-[10px] uppercase">Authorize Deployment</button>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-black/90 p-4 rounded-2xl border border-slate-800 h-28 mono text-[10px]">
                                {logs.map((log, i) => (
                                    <div key={i} className={i === 0 ? "text-cyan-400" : "text-slate-700"}>{log}</div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* SUCCESS OVERLAY */}
                    {missionStage === 4 && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-xl p-6">
                            <div className="glass p-12 max-w-xl text-center border-cyan-400 shadow-[0_0_150px_rgba(34,211,238,0.5)]">
                                <div className="text-7xl mb-8 animate-bounce">⚡</div>
                                <h2 className="text-5xl font-black text-white italic mb-2 uppercase tracking-tighter leading-none">NODE SYNCHRONIZED</h2>
                                <p className="text-cyan-400 text-xs font-bold uppercase mb-8 tracking-[0.3em]">SYSTEM ARCHITECT MISSION SUCCESS</p>
                                <p className="text-slate-400 text-xs leading-relaxed mb-10">
                                    Your packet successfully navigated the protocol stack using <strong>Encapsulation</strong>, established a <strong>TCP Handshake</strong>, and cleared the <strong>Nginx Reverse Proxy</strong> security rules. The network interaction between GitHub and AWS is live.
                                </p>
                                <button onClick={() => window.location.reload()} className="bg-white text-black px-12 py-4 rounded-full font-black text-xs uppercase hover:scale-110 transition-all shadow-xl">Re-Init System</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
